# Firebase App Hosting configuration.
# Docs: https://firebase.google.com/docs/app-hosting/configure
#
# Secrets: `firebase apphosting:secrets:set <NAME> --data-file=...`
# Then grant the backend: `firebase apphosting:secrets:grantaccess <NAMES> -b seriousflux-ecommerce`
#
# Local overrides stay in `.env.local` (never commit).

runConfig:
  minInstances: 0
  maxInstances: 2
  memoryMiB: 512
  cpu: 1

env:
  # --- Secrets (RUNTIME) ---
  - variable: FIREBASE_SERVICE_ACCOUNT_KEY
    secret: FIREBASE_SERVICE_ACCOUNT_KEY
    availability:
      - RUNTIME

  - variable: NOTIFICATIONS_DISPATCH_SECRET
    secret: NOTIFICATIONS_DISPATCH_SECRET
    availability:
      - RUNTIME

  - variable: MERCADOPAGO_ACCESS_TOKEN
    secret: MERCADOPAGO_ACCESS_TOKEN
    availability:
      - RUNTIME

  - variable: RESEND_API_KEY
    secret: RESEND_API_KEY
    availability:
      - RUNTIME

  # Uncomment after setting the secret in MP dashboard + Secret Manager:
  # - variable: MERCADOPAGO_WEBHOOK_SECRET
  #   secret: MERCADOPAGO_WEBHOOK_SECRET
  #   availability:
  #     - RUNTIME

  # --- Public / build-time (non-secret) ---
  - variable: NEXT_PUBLIC_APP_URL
    value: https://www.thecasacasclub.com
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyA27bXx8r1WuW_CsUfaic8kGSIn4Aqed8Y
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: the-casacas-club.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: the-casacas-club
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: the-casacas-club.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "463486196517"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:463486196517:web:c0d4078062f26ae64158cc
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    value: G-CD7HVJ963F
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_MERCADOPAGO_PUBLIC_KEY
    value: APP_USR-c02ddb0f-da6f-48fd-906b-f643dfa35387
    availability:
      - BUILD
      - RUNTIME

  # Keep sandbox until you intentionally take live payments
  - variable: MERCADOPAGO_SANDBOX
    value: "true"
    availability:
      - RUNTIME
