# Firebase App Hosting configuration (optional but useful for testing / production).
# Docs: https://firebase.google.com/docs/app-hosting/configure
#
# Prefer setting NEXT_PUBLIC_* values in the Firebase Console → App Hosting
# → your backend → Environment for a first test deploy.
# You can move them here later (or reference Secret Manager).

runConfig:
  # Keep defaults for a test rollout; raise if the store grows.
  minInstances: 0
  maxInstances: 2
  memoryMiB: 512
  cpu: 1

# Example — uncomment and fill, or use Console env vars instead:
# env:
#   - variable: NEXT_PUBLIC_FIREBASE_API_KEY
#     value: your-api-key
#     availability:
#       - BUILD
#       - RUNTIME
#   - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
#     value: your-project.firebaseapp.com
#     availability:
#       - BUILD
#       - RUNTIME
#   - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
#     value: your-project-id
#     availability:
#       - BUILD
#       - RUNTIME
#   - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
#     value: your-project.appspot.com
#     availability:
#       - BUILD
#       - RUNTIME
#   - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
#     value: "123456789"
#     availability:
#       - BUILD
#       - RUNTIME
#   - variable: NEXT_PUBLIC_FIREBASE_APP_ID
#     value: 1:123456789:web:abc
#     availability:
#       - BUILD
#       - RUNTIME
