# Firebase App Hosting configuration.
# Docs: https://firebase.google.com/docs/app-hosting/configure
#
# Public NEXT_PUBLIC_* values can live in Console → App Hosting → Environment
# or below as plaintext. Secrets must use Cloud Secret Manager (never commit JSON keys).
#
# Create secrets (from repo root, after `firebase login` + `firebase use`):
#   firebase apphosting:secrets:set FIREBASE_SERVICE_ACCOUNT_KEY --data-file=.secrets/firebase-admin.json
#   firebase apphosting:secrets:set NOTIFICATIONS_DISPATCH_SECRET
#   firebase apphosting:secrets:set MERCADOPAGO_ACCESS_TOKEN
#   firebase apphosting:secrets:set MERCADOPAGO_WEBHOOK_SECRET
#   firebase apphosting:secrets:set RESEND_API_KEY

runConfig:
  minInstances: 0
  maxInstances: 2
  memoryMiB: 512
  cpu: 1

env:
  # Admin SDK (GAP-004) — JSON service account as a Secret Manager secret
  - variable: FIREBASE_SERVICE_ACCOUNT_KEY
    secret: FIREBASE_SERVICE_ACCOUNT_KEY
    availability:
      - RUNTIME

  # Uncomment after creating each secret with `firebase apphosting:secrets:set …`
  # - variable: NOTIFICATIONS_DISPATCH_SECRET
  #   secret: NOTIFICATIONS_DISPATCH_SECRET
  #   availability:
  #     - RUNTIME
  # - variable: MERCADOPAGO_ACCESS_TOKEN
  #   secret: MERCADOPAGO_ACCESS_TOKEN
  #   availability:
  #     - RUNTIME
  # - variable: MERCADOPAGO_WEBHOOK_SECRET
  #   secret: MERCADOPAGO_WEBHOOK_SECRET
  #   availability:
  #     - RUNTIME
  # - variable: RESEND_API_KEY
  #   secret: RESEND_API_KEY
  #   availability:
  #     - RUNTIME
